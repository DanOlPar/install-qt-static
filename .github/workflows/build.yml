name: Build static Qt

on:
  workflow_dispatch:
    inputs:
      buildtype:
        description: 'Build type'
        required: true
        default: 'all'
        type: choice
        options:
        - linux
        - windows
        - macos
        - all
  push:
    tags:
      - '*-*' # Only tags with build number
permissions:
  contents: write

jobs:
  setup:
    env:
      BUILD_LINUX: ${{(inputs.buildtype == 'all' || inputs.buildtype == 'linux') }}
      BUILD_WINDOWS: ${{(inputs.buildtype == 'all' || inputs.buildtype == 'macos') }}
      BUILD_MACOS: ${{(inputs.buildtype == 'all' || inputs.buildtype == 'macos') }}
    runs-on: ubuntu-latest
    outputs:
      activeos: ${{ steps.setup.outputs.runner }}
    steps:
      - name: Check os to build
        id: setup
        run: |
          ARRAY=()
          if [ ${{ env.BUILD_LINUX }}  ]; then
            ARRAY+=('ubuntu-latest')
          fi
          if [ ${{ env.BUILD_WINDOWS }}  ]; then
            ARRAY+=('windows-latest')
          fi
          if [ ${{ env.BUILD_MACOS }}  ]; then
            ARRAY+=('macos-latest')
          fi
          json='runner='
          json+=$(printf '%s\n' "${ARRAY[@]}" | jq -R . | jq -s .)
          echo $json >> $GITHUB_OUTPUT
  build:
    needs: setup
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(needs.setup.outputs.activeos) }}
        include:
        - os: windows-latest
          os-caption: windows
        - os: macos-latest
          os-caption: macos
        - os: ubuntu-latest
          os-caption: linux

    runs-on: ${{matrix.os}}

    steps:
      - uses: actions/checkout@v4
      - name: Find Qt version
        shell: python
        run: |
          import re
          import os

          with open("action.yml") as f:
            action_content = f.read()
          match = re.search(r"VERSION_TAG: v([\d.]+)", action_content)
          print("Found Qt version:", match[1])
          with open(os.environ["GITHUB_ENV"], "a") as f:
            f.write("QT_VERSION=" + match[1])

      
      - name: Set up Linux libraries
        if: contains(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt remove clang-13
          sudo apt remove clang-14
          sudo apt remove clang-15
          sudo apt-get install -y tar mesa-utils xvfb apt-utils \
                sudo vim git wget curl locales ssh htop \
                build-essential libssl-dev zlib1g-dev libbz2-dev \
                libreadline-dev libsqlite3-dev wget curl llvm \
                libncurses5-dev libncursesw5-dev xz-utils liblzma-dev \
                g++ make unzip zip \
               libfontconfig1-dev \
               libfreetype-dev libx11-dev libx11-xcb-dev libxcb-cursor-dev libxcb-glx0-dev libxcb-icccm4-dev libxcb-image0-dev libxcb-keysyms1-dev libxcb-randr0-dev libxcb-render-util0-dev libxcb-shape0-dev libxcb-shm0-dev libxcb-sync-dev libxcb-util-dev libxcb-xfixes0-dev libxcb-xinerama0-dev libxcb-xkb-dev libxcb1-dev libxext-dev libxfixes-dev libxi-dev libxkbcommon-dev libxkbcommon-x11-dev libxrender-dev \
               python3-html5lib nodejs \
              mesa-common-dev libgl1-mesa-dev libglu1-mesa-dev \
              llvm-dev libclang-dev 
          

      - name: Restore qt sources from cache
        id: cache-qt-restore
        uses: actions/cache/restore@v4
        with:
          key:  ${{env.QT_VERSION}}-${{ matrix.os }}
          path: "~/qtsrc"



      - uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Clone Qt repo
        if: steps.cache-qt-restore.outputs.cache-hit != 'true'
        run: |
          cd ~
          mkdir qtsrc
          cd qtsrc
          git clone https://code.qt.io/qt/qt5.git . -b '${{env.QT_VERSION}}'
          perl init-repository

      - name: Save Qt Sources to cache if new
        id: cache-qt-save
        if: always() &&  steps.cache-qt-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          key: ${{ steps.cache-qt-restore.outputs.cache-primary-key }}
          path: "~/qtsrc"
      


      - name: Free Disk Space (Ubuntu)
        if: contains(matrix.os, 'ubuntu')
        uses: jlumbroso/free-disk-space@main
        with:
          # this might remove tools that are actually needed,
          # if set to "true" but frees about 6 GB
          tool-cache: false
        
          # all of these default to true, but feel free to set to
          # "false" if necessary for your workflow
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: true


        
      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        if: contains(matrix.os, 'windows')

      - name: Build Qt (Windows)
        if: contains(matrix.os, 'windows')
        env:
          CL: /MP # Build with multiple processes
        run: |
          cd ~
          mkdir qt_build
          cd qt_build
          ~\qtsrc\configure.bat -release -static -optimize-size -prefix "..\qt_static" -no-feature-accessibility -nomake examples -nomake tools 
          cmake --build . --parallel 4
          cmake --install .

      - name: Build Qt (macOS)
        if: contains(matrix.os, 'macos')
        run: |
          cd ~
          mkdir qt_build
          cd qt_build
          ~/qtsrc/configure -static -release -optimize-size -prefix "../qt_static" -no-feature-accessibility -nomake examples -nomake tools -- -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64"
          cmake --build . --parallel 3
          cmake --install .

      - name: Build Qt (linux)
        if: contains(matrix.os, 'ubuntu')
        run: |
          cd ~
          mkdir qt_build
          cd qt_build
          ~/qtsrc/configure -static -release -optimize-size -prefix "../qt_static" -no-feature-accessibility -nomake examples -nomake tools
          cmake --build . --parallel 4
          cmake --install .

      - name: Package binaries
        run: |
          cd ~
          7z a -r qt-${{env.QT_VERSION}}-static-${{matrix.os-caption}}.zip qt_static

      - uses: actions/upload-artifact@v4
        with:
          name: qt-static-${{matrix.os-caption}}
          path:  ~/qt-*.zip

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
      - name: Find Qt version
        shell: python
        run: |
          import re
          import os

          with open("action.yml") as f:
            action_content = f.read()
          match = re.search(r"VERSION_TAG: v([\d.]+)", action_content)
          print("Found Qt version:", match[1])
          with open(os.environ["GITHUB_ENV"], "a") as f:
            f.write("QT_VERSION=" + match[1])
      - name: Shorthand tags
        run: |
          git config --global user.email "27856297+dependabot-preview[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git tag -d v$QT_VERSION || true
          git tag v$QT_VERSION -m v$QT_VERSION
          git push -f origin v$QT_VERSION
          git tag -d v${QT_VERSION%.*} || true
          git tag v${QT_VERSION%.*} -m v${QT_VERSION%.*}
          git push -f origin v${QT_VERSION%.*}
